name: Publish Docker Image

on:
  release:
    types: [published]

jobs:
  publish:
    runs-on: ubuntu-latest
    strategy:
      matrix:
        rocky_version: ['8', '9', '10']
    steps:
      - uses: actions/checkout@v4

      - name: Read Slurm version from .env.example
        id: config
        run: |
          echo "slurm_version=$(grep '^SLURM_VERSION=' .env.example | cut -d= -f2)" >> "$GITHUB_OUTPUT"

      - uses: docker/setup-qemu-action@v4

      - uses: docker/setup-buildx-action@v4

      - uses: docker/login-action@v4
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      - name: Build and push RL${{ matrix.rocky_version }} image
        uses: docker/build-push-action@v7
        with:
          context: .
          # RL8: restrict to amd64 due to EPEL 8 aarch64 package gaps
          platforms: ${{ matrix.rocky_version == '8' && 'linux/amd64' || 'linux/amd64,linux/arm64' }}
          push: true
          build-args: |
            SLURM_VERSION=${{ steps.config.outputs.slurm_version }}
            ROCKY_VERSION=${{ matrix.rocky_version }}
          tags: |
            ${{ secrets.DOCKERHUB_USERNAME }}/slurm-docker:${{ steps.config.outputs.slurm_version }}-rl${{ matrix.rocky_version }}
            ${{ secrets.DOCKERHUB_USERNAME }}/slurm-docker:${{ steps.config.outputs.slurm_version }}-rl${{ matrix.rocky_version }}-${{ github.event.release.tag_name }}

      - name: Push convenience aliases (RL10 only)
        if: matrix.rocky_version == '10'
        uses: docker/build-push-action@v7
        with:
          context: .
          platforms: linux/amd64,linux/arm64
          push: true
          build-args: |
            SLURM_VERSION=${{ steps.config.outputs.slurm_version }}
            ROCKY_VERSION=10
          tags: |
            ${{ secrets.DOCKERHUB_USERNAME }}/slurm-docker:latest
            ${{ secrets.DOCKERHUB_USERNAME }}/slurm-docker:${{ steps.config.outputs.slurm_version }}
